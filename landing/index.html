<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>Private — Authorized Access</title>
<style>
:root{--bg:#06070c;--ink:#e9ecff;--mut:#8b91b8;--line:rgba(255,255,255,.08);--accent:#d4af37}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6}
.card{max-width:600px;width:100%;padding:36px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.03);text-align:center}
.lock{font-size:2.4rem;margin-bottom:14px}
h1{font-size:1.5rem;margin-bottom:10px;letter-spacing:-.01em}
p{color:var(--mut);font-size:.95rem;margin-bottom:8px}
.pill{display:inline-block;margin-top:18px;padding:6px 14px;border:1px solid var(--accent);border-radius:30px;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent)}
</style>
</head>
<body>
<main class="card">
  <div class="lock">🔒</div>
  <h1>Private workspace</h1>
  <p>This page is intentionally unlisted and not indexed by search engines.</p>
  <p>If you arrived here by mistake, there is nothing public on this URL.</p>
  <span class="pill">Authorized access only</span>
</main>
</body>
</html>
