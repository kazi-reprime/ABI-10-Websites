          - generic [ref=e60]: Manhattan · 500 Hours · ≈ 4 Months
          - heading "500-Hour Master Barber Program" [level=3] [ref=e61]
          - generic [ref=e62]: $5,600
          - paragraph [ref=e63]: Our comprehensive 500-hour Master Barber training program is meticulously designed to equip students with the knowledge and skills necessary to thrive in the competitive world of barbering — from mastering classic techniques to staying updated on the latest trends.
        - generic [ref=e64]:
          - generic [ref=e65]: Bronx · 500 Hours · ≈ 4 Months
          - heading "500-Hour Master Barber Program — Bronx" [level=3] [ref=e66]
          - generic [ref=e67]: $5,600
          - paragraph [ref=e68]: Become a licensed Master Barber in New York State at our Bronx campus. The same comprehensive 500-hour curriculum as Manhattan, with the same flexible payment plans, hands-on training, and job placement assistance. Take control of your income, open your own barbershop, and thrive in a recession-proof industry.
        - generic [ref=e69]:
          - generic [ref=e70]: Manhattan · 50 Hours · 2 Weeks
          - heading "50-Hour Barber Refresher Program" [level=3] [ref=e71]
          - generic [ref=e72]: $1,500
          - paragraph [ref=e73]: Designed for licensed individuals, cosmetologists, hairdressers, and barber apprentices looking to sharpen their skills. Covers classical haircutting, straight razor shaves, fades, tapers, and NY State Board Exam prep.
        - generic [ref=e74]:
          - generic [ref=e75]: Manhattan & Bronx · 3 Hours · 1 Session
          - heading "3-Hour Contagious Diseases Program" [level=3] [ref=e76]
          - generic [ref=e77]: $100
          - paragraph [ref=e78]: The required HIV/Contagious Diseases course for the New York State Board of Barbering Exam. Covers bloodborne pathogen safety, sanitation standards, and NY State regulations. Available to all prospective and current students.
