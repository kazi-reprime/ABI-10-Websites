          - heading "500-Hour Master Barber Program" [level=3] [ref=e59]
          - generic [ref=e60]: $5,600
          - paragraph [ref=e61]: Our comprehensive 500-hour Master Barber training program is meticulously designed to equip students with the knowledge and skills necessary to thrive in the competitive world of barbering — from mastering classic techniques to staying updated on the latest trends.
        - generic [ref=e62]:
