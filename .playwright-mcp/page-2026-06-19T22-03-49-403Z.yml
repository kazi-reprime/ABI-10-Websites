          - heading "500-Hour Master Barber Program — Bronx" [level=3] [ref=e64]
          - generic [ref=e65]: $5,600
          - paragraph [ref=e66]: Become a licensed Master Barber in New York State at our Bronx campus. The same comprehensive 500-hour curriculum as Manhattan, with the same flexible payment plans, hands-on training, and job placement assistance. Take control of your income, open your own barbershop, and thrive in a recession-proof industry.
        - generic [ref=e67]:
          - generic [ref=e68]: Manhattan · 50 Hours · 2 Weeks
          - heading "50-Hour Barber Refresher Program" [level=3] [ref=e69]
          - generic [ref=e70]: $1,500
          - paragraph [ref=e71]: Designed for licensed individuals, cosmetologists, hairdressers, and barber apprentices looking to sharpen their skills. Covers classical haircutting, straight razor shaves, fades, tapers, and NY State Board Exam prep.
        - generic [ref=e72]:
          - generic [ref=e73]: Manhattan & Bronx · 3 Hours · 1 Session
          - heading "3-Hour Contagious Diseases Program" [level=3] [ref=e74]
          - generic [ref=e75]: $100
          - paragraph [ref=e76]: The required HIV/Contagious Diseases course for the New York State Board of Barbering Exam. Covers bloodborne pathogen safety, sanitation standards, and NY State regulations. Available to all prospective and current students.
