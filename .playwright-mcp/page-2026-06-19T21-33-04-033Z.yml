          - generic [ref=e174]:
            - paragraph [ref=e175]: 05·The Press-Featured Partner
            - heading "Otis & Finn" [level=3] [ref=e176]
            - generic [ref=e177]:
              - paragraph [ref=e178]: Otis & Finn Barbershop is one of NYC's most celebrated state-of-the-art barbershops — featured in GQ, BuzzFeed, HuffPost, FOX5, and PIX11 — with four locations across Long Island City, Court Square, Greenpoint, and Williamsburg.
              - paragraph [ref=e179]: ABI graduates are part of the team that has earned Otis & Finn its reputation for classic, high-quality barbering and a radically inclusive community space. One of those graduates, James Cavanaugh — a native New Yorker working out of the Greenpoint location — has been cutting hair professionally for five years since earning his license at ABI. Otis & Finn proudly names ABI on his official bio page.
            - blockquote [ref=e180]: "That's the kind of partnership ABI graduates step into: shops that back their alumni publicly, invest in continuing education, and treat their team as the brand."
            - generic [ref=e181]:
              - link "otisandfinn.com" [ref=e182] [cursor=pointer]:
