              - paragraph [ref=e97]: "The shop is owned by Mike — a proud ABI graduate and the older brother of current ABI bilingual instructor Richard Cancel. Mike's success is also why Richard came back to ABI as a teacher: same school, same craft, two generations of one family training the next wave of barbers."
            - blockquote [ref=e98]: One school. One block. One family. Generations of master barbers.
