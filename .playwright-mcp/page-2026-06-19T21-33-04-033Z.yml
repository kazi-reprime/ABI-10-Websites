        - paragraph [ref=e64]: Real shops. Real careers. One school behind every chair.
        - paragraph [ref=e65]: For nearly 30 years, American Barber Institute graduates have walked out of our classrooms and into careers that build real lives. Some open their own shops. Some become co-owners. Some join the most respected teams in New York. Here are six of the places they go.
