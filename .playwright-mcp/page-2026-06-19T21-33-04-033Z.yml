            - paragraph [ref=e74]: 01·The 30-Year Empire
            - heading "Levels Barbershop" [level=3] [ref=e75]
            - generic [ref=e76]:
              - paragraph [ref=e77]: Levels Barbershop was founded in 1996 on 125th Street in Harlem by Kamal Nuru. Today it spans Manhattan, Brooklyn, and Orange County, NY — alongside The Antique Barber product line, Barber World TV media platform, and the annual NYC Barber Battle.
              - paragraph [ref=e78]: Several of the Nuru family co-owners are proud ABI graduates. Approximately 15 years ago, they earned their licenses with us before going on to help build one of the most iconic names in NYC barbering. Many of the licensed barbers working at Levels today are also ABI alumni — placed there by graduates who came before them.
              - paragraph [ref=e79]: "The relationship is alive today: Barber World TV featured ABI Lead Instructor Harold \"Barkim\" Brown on Episode 007, sharing his story with the wider industry."
            - blockquote [ref=e80]: Train at ABI. Earn your license. Build something that lasts.
            - link "levelsbarbershop.com" [ref=e82] [cursor=pointer]:
