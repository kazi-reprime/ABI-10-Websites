          - img "Expo Gentlemen Salon — barber at work" [ref=e147]
          - generic [ref=e148]:
            - paragraph [ref=e149]: 04·The Trusted Partner
            - heading "Expo Gentlemen Salon" [level=3] [ref=e150]
            - generic [ref=e151]:
              - paragraph [ref=e152]: Not every ABI story is about a graduate who opened their own shop. Some of the most important stories are about the owners who hire our graduates.
              - paragraph [ref=e153]: Joe isn't an ABI graduate — and he didn't have to be. As the established entrepreneur behind Expo Gentlemen Salon, with locations in Staten Island and Brooklyn, Joe has built two thriving shops by trusting American Barber Institute to send him the talent he needs, year after year.
              - paragraph [ref=e154]: "Multiple ABI alumni anchor the team across both locations. The relationship is built on something simple: every graduate ABI sends, performs. That trust has held for years — and it's why, when Joe needs to hire, he calls ABI first."
            - blockquote [ref=e155]: For every ABI grad who becomes an owner, many more walk into established shops like Joe's and build real careers.
