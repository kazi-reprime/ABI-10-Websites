        - generic [ref=e192]:
          - img "NYC Barber Shop Museum logo" [ref=e195]
          - generic [ref=e196]:
            - paragraph [ref=e197]: 06·The Living Museum
            - heading "NYC Barber Shop Museum" [level=3] [ref=e198]
            - generic [ref=e199]:
              - paragraph [ref=e200]: On Manhattan's Upper West Side, NYC Barber Shop Museum — operated under REAMIR & Co. on Columbus Avenue and East 70th Street, with a second location in Sunny Isles, Miami — is the first museum of its kind in New York City and a working barbershop where every cut is performed surrounded by more than a century of barbering history.
              - paragraph [ref=e201]: Behind the chairs is Master Barber Arthur Rubinoff — a fourth-generation barber whose lineage stretches from Fergana, Uzbekistan, to the Upper West Side. After his father Rubin passed in 2003, Arthur traveled the world tracking down more than a thousand artifacts — including his great-grandfather's original tools and a 1929 chair believed to have been used by James Dean — and opened the museum in June 2018. The shop earned New York Style Magazine's Best Barbershop award in 2015 and now operates as a 501(c)(3) non-profit.
              - paragraph [ref=e202]: "For years, ABI and Arthur Rubinoff have shared a pipeline. Alex, owner of ABI, has placed graduates with the NYC Barber Shop Museum — building one of the rarest things in this industry: a trusted, ongoing relationship between a school and a master. For ABI students, working there isn't simply a job. It's a benchmark — where the standards of four generations of master barbering become the standards a young barber carries for the rest of their career."
            - blockquote [ref=e203]: To learn at ABI is to step into a craft. To work at the NYC Barber Shop Museum is to step into a lineage.
