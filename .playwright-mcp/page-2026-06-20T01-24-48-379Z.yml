    - generic [ref=e87]:
      - generic [ref=e88]: // Barber Programs — NYC
      - heading "Choose your path to a Master Barber License" [level=2] [ref=e89]
      - paragraph [ref=e90]: Four state-licensed programs across two NYC campuses. Flexible weekly payment plans on every track.
      - generic [ref=e91]:
        - generic [ref=e92]:
          - generic [ref=e93]: Most Popular
          - generic [ref=e94]: // Manhattan · 500 Hours · ≈ 4 Months
          - heading "500-Hour Master Barber Program" [level=3] [ref=e95]
          - generic [ref=e96]: $5,600
          - paragraph [ref=e97]: Our comprehensive 500-hour Master Barber training program is meticulously designed to equip students with the knowledge and skills necessary to thrive in the competitive world of barbering — from mastering classic techniques to staying updated on the latest trends.
        - generic [ref=e98]:
          - generic [ref=e99]: // Bronx · 500 Hours · ≈ 4 Months
          - heading "500-Hour Master Barber Program — Bronx" [level=3] [ref=e100]
          - generic [ref=e101]: $5,600
          - paragraph [ref=e102]: Become a licensed Master Barber in New York State at our Bronx campus. The same comprehensive 500-hour curriculum as Manhattan, with the same flexible payment plans, hands-on training, and job placement assistance. Take control of your income, open your own barbershop, and thrive in a recession-proof industry.
        - generic [ref=e103]:
          - generic [ref=e104]: // Manhattan · 50 Hours · 2 Weeks
          - heading "50-Hour Barber Refresher Program" [level=3] [ref=e105]
          - generic [ref=e106]: $1,500
          - paragraph [ref=e107]: Designed for licensed individuals, cosmetologists, hairdressers, and barber apprentices looking to sharpen their skills. Covers classical haircutting, straight razor shaves, fades, tapers, and NY State Board Exam prep.
        - generic [ref=e108]:
          - generic [ref=e109]: // Manhattan & Bronx · 3 Hours · 1 Session
          - heading "3-Hour Contagious Diseases Program" [level=3] [ref=e110]
          - generic [ref=e111]: $100
          - paragraph [ref=e112]: The required HIV/Contagious Diseases course for the New York State Board of Barbering Exam. Covers bloodborne pathogen safety, sanitation standards, and NY State regulations. Available to all prospective and current students.
