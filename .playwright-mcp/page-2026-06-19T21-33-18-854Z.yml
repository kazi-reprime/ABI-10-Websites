        - generic [ref=e192]:
          - img "NYC Barber Shop Museum logo" [ref=e195]
          - generic [ref=e196]:
            - paragraph [ref=e197]: 06·El Museo Vivo
            - heading "NYC Barber Shop Museum" [level=3] [ref=e198]
            - generic [ref=e199]:
              - paragraph [ref=e200]: En el Upper West Side de Manhattan, NYC Barber Shop Museum — operado bajo REAMIR & Co. en Columbus Avenue y la Calle 70 Este, con una segunda sede en Sunny Isles, Miami — es el primer museo de su tipo en la ciudad de Nueva York y una barbería en funcionamiento donde cada corte se realiza rodeado de más de un siglo de historia de la barbería.
              - paragraph [ref=e201]: Detrás de las sillas está el Maestro Barbero Arthur Rubinoff — un barbero de cuarta generación cuyo linaje se extiende desde Fergana, Uzbekistán, hasta el Upper West Side. Tras la muerte de su padre Rubin en 2003, Arthur viajó por el mundo rastreando más de mil artefactos — incluidas las herramientas originales de su bisabuelo y una silla de 1929 que se cree fue usada por James Dean — y abrió el museo en junio de 2018. La barbería ganó el premio Best Barbershop de New York Style Magazine en 2015 y hoy opera como una organización sin fines de lucro 501(c)(3).
              - paragraph [ref=e202]: "Por años, ABI y Arthur Rubinoff han compartido un pipeline. Alex, dueño de ABI, ha colocado graduados con el NYC Barber Shop Museum — construyendo una de las cosas más raras de esta industria: una relación confiable y continua entre una escuela y un maestro. Para los estudiantes de ABI, trabajar allí no es simplemente un trabajo. Es un punto de referencia — donde los estándares de cuatro generaciones de maestros barberos se convierten en los estándares que un joven barbero llevará por el resto de su carrera."
            - blockquote [ref=e203]: Estudiar en ABI es entrar en un oficio. Trabajar en el NYC Barber Shop Museum es entrar en un linaje.
            - generic [ref=e204]:
              - link "barbershopmuseum.com" [ref=e205] [cursor=pointer]:
                - /url: https://barbershopmuseum.com
                - img [ref=e206]
                - text: barbershopmuseum.com
              - generic [ref=e209]:
                - img [ref=e210]
                - text: Columbus Ave & E 70th St, Manhattan
