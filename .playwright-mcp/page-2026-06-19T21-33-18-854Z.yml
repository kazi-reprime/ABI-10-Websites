            - generic [ref=e95]:
              - paragraph [ref=e96]: Diamond Fadez Barbershop se encuentra a una cuadra del campus principal de ABI, en el 308 West 39th Street — un estudio combinado de barbería y tatuajes que los clientes llaman "la mejor barbería de la ciudad".
              - paragraph [ref=e97]: "La barbería es propiedad de Mike — un orgulloso graduado de ABI y hermano mayor del actual instructor bilingüe de ABI, Richard Cancel. El éxito de Mike también es la razón por la que Richard regresó a ABI como maestro: misma escuela, mismo oficio, dos generaciones de una familia formando a la próxima ola de barberos."
