          - generic [ref=e174]:
            - paragraph [ref=e175]: 05·El Socio Reconocido por la Prensa
            - heading "Otis & Finn" [level=3] [ref=e176]
            - generic [ref=e177]:
              - paragraph [ref=e178]: Otis & Finn Barbershop es una de las barberías más celebradas y vanguardistas de NYC — presentada en GQ, BuzzFeed, HuffPost, FOX5 y PIX11 — con cuatro sedes en Long Island City, Court Square, Greenpoint y Williamsburg.
              - paragraph [ref=e179]: Los graduados de ABI son parte del equipo que le ha ganado a Otis & Finn su reputación por una barbería clásica y de alta calidad y un espacio comunitario radicalmente inclusivo. Uno de esos graduados, James Cavanaugh — un neoyorquino nativo que trabaja en la sede de Greenpoint — ha cortado cabello profesionalmente durante cinco años desde que obtuvo su licencia en ABI. Otis & Finn nombra orgullosamente a ABI en su página oficial de biografía.
            - blockquote [ref=e180]: "Ese es el tipo de alianza al que entran los graduados de ABI: barberías que respaldan públicamente a sus alumnos, invierten en educación continua y tratan a su equipo como la marca."
            - generic [ref=e181]:
