          - generic [ref=e148]:
            - paragraph [ref=e149]: 04·El Socio de Confianza
            - heading "Expo Gentlemen Salon" [level=3] [ref=e150]
            - generic [ref=e151]:
              - paragraph [ref=e152]: No todas las historias de ABI son sobre un graduado que abrió su propia barbería. Algunas de las historias más importantes son sobre los dueños que contratan a nuestros graduados.
              - paragraph [ref=e153]: Joe no es un graduado de ABI — y no necesitaba serlo. Como el empresario establecido detrás de Expo Gentlemen Salon, con sedes en Staten Island y Brooklyn, Joe ha construido dos barberías prósperas confiando en American Barber Institute para enviarle el talento que necesita, año tras año.
              - paragraph [ref=e154]: "Varios alumnos de ABI son la base del equipo en ambas sedes. La relación se basa en algo simple: cada graduado que ABI envía, rinde. Esa confianza se ha mantenido por años — y es por eso que, cuando Joe necesita contratar, llama a ABI primero."
            - blockquote [ref=e155]: Por cada graduado de ABI que se convierte en dueño, muchos más entran a barberías establecidas como la de Joe y construyen carreras reales.
