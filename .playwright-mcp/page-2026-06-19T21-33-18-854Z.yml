        - heading "Las Barberías de Nuestros Estudiantes" [level=2] [ref=e63]
        - paragraph [ref=e64]: Barberías reales. Carreras reales. Una escuela detrás de cada silla.
        - paragraph [ref=e65]: Por casi 30 años, los graduados de American Barber Institute han salido de nuestras aulas hacia carreras que construyen vidas reales. Algunos abren sus propias barberías. Algunos se convierten en copropietarios. Algunos se unen a los equipos más respetados de Nueva York. Aquí hay seis de los lugares a los que llegan.
      - generic [ref=e66]:
        - generic [ref=e69]:
          - img "Levels Barbershop logo" [ref=e72]
          - generic [ref=e73]:
            - paragraph [ref=e74]: 01·El Imperio de 30 Años
            - heading "Levels Barbershop" [level=3] [ref=e75]
            - generic [ref=e76]:
              - paragraph [ref=e77]: Levels Barbershop fue fundada en 1996 en la Calle 125 de Harlem por Kamal Nuru. Hoy se extiende por Manhattan, Brooklyn y Orange County, NY — junto a la línea de productos The Antique Barber, la plataforma de medios Barber World TV y la batalla anual NYC Barber Battle.
              - paragraph [ref=e78]: Varios de los copropietarios de la familia Nuru son orgullosos graduados de ABI. Hace aproximadamente 15 años obtuvieron su licencia con nosotros antes de ayudar a construir uno de los nombres más icónicos de la barbería neoyorquina. Muchos de los barberos con licencia que trabajan hoy en Levels también son alumnos de ABI — colocados allí por graduados que vinieron antes.
              - paragraph [ref=e79]: "La relación sigue viva hoy: Barber World TV presentó al instructor principal de ABI, Harold \"Barkim\" Brown, en el Episodio 007, compartiendo su historia con la industria."
            - blockquote [ref=e80]: Estudia en ABI. Obtén tu licencia. Construye algo que perdure.
            - link "levelsbarbershop.com" [ref=e82] [cursor=pointer]:
              - /url: https://www.levelsbarbershop.com
              - img [ref=e83]
              - text: levelsbarbershop.com
