            - paragraph [ref=e122]: 03·La Historia de Dos Años
            - heading "Untouchable Cutz" [level=3] [ref=e123]
            - generic [ref=e124]:
              - paragraph [ref=e125]: Cuando Jimmy entró a ABI, ya estaba en otro nivel — súper avanzado desde el primer día, haciendo preguntas, retando los límites, construyendo amistades con cada persona que lo enseñaba.
              - paragraph [ref=e126]: Solo dos años después de obtener su licencia de ABI, Jimmy abrió su propia barbería.
              - paragraph [ref=e127]: Aproximadamente 15 años después, Untouchable Cutz es una de las barberías más respetadas de Staten Island — un hermoso espacio moderno respaldado por un equipo con más de 50 años combinados de experiencia. A lo largo de los años, Jimmy ha contratado a muchos graduados de ABI, y su barbería hoy ofrece tutorías privadas y clases semanales de grooming — pasando el oficio a la próxima generación.
            - blockquote [ref=e128]: De la licencia a la propiedad en dos años. El esfuerzo nunca para.
